<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Broadsign Integration Test</title>
  <link rel="icon" href="/test/favicon.ico" type="image/x-icon">
  <style>
    :root {
      --bg-primary: #fff;
      --bg-secondary: #000;
      --bg-muted: rgba(0,0,0,.05);
      --text-primary: #000;
      --text-secondary: #fff;
      --text-muted: rgba(0,0,0,.6);
      --text-disabled: rgba(0,0,0,.4);
      --border: #d4d4d4;
      --error-bg: #fef2f2; --error-text: #7f1d1d;
      --warn-bg: #fff7ed;  --warn-text: #7c2d12;
      --ok-bg: #f0fdf4;    --ok-text: #14532d;
      --accent: #164e63;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      background: var(--bg-secondary);
      color: var(--text-secondary);
      padding: 12px 24px;
      border-bottom: 3px solid var(--text-primary);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 16px; font-weight: 900; letter-spacing: .05em; text-transform: uppercase; }
    header .version { font-size: 12px; opacity: .5; font-weight: 400; }

    /* ── Layout ──────────────────────────────────────────────── */
    .container { display: flex; flex: 1; overflow: hidden; }

    .sidebar {
      width: 320px;
      background: var(--bg-muted);
      border-right: 3px solid var(--border);
      padding: 20px;
      overflow-y: auto;
    }

    .main { flex: 1; display: flex; flex-direction: column; }

    /* ── Toolbar ─────────────────────────────────────────────── */
    .toolbar {
      background: var(--bg-muted);
      padding: 12px 24px;
      border-bottom: 3px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .toolbar-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }

    /* ── Content ──────────────────────────────────────────────── */
    .content {
      flex: 1;
      position: relative;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .content-wrapper {
      position: relative;
      background: #fff;
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
    }

    iframe { width: 100%; height: 100%; border: none; }

    .placeholder {
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    /* ── Logs ────────────────────────────────────────────────── */
    .logs {
      height: 220px;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border-top: 3px solid var(--text-primary);
      overflow-y: auto;
      padding: 12px 16px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }

    .log-entry {
      padding: 3px 0;
      border-left: 3px solid transparent;
      padding-left: 10px;
      margin: 1px 0;
    }
    .log-entry.info    { border-left-color: var(--accent); }
    .log-entry.success { border-left-color: #16a34a; }
    .log-entry.error   { border-left-color: #dc2626; }
    .log-entry.warning { border-left-color: #ea580c; }
    .log-entry .ts     { color: #6b7280; }

    /* ── Buttons ─────────────────────────────────────────────── */
    button {
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border: 3px solid var(--text-primary);
      padding: 8px 16px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .05em;
      text-transform: uppercase;
      transition: all .1s ease;
    }
    button:hover:not(:disabled) {
      transform: translate(-2px,-2px);
      box-shadow: 4px 4px 0 var(--text-primary);
    }
    button:active:not(:disabled) { transform: translate(0,0); box-shadow: none; }
    button:disabled {
      background: var(--bg-muted); color: var(--text-disabled);
      border-color: rgba(0,0,0,.2); cursor: not-allowed;
    }
    button.danger { background: #dc2626; color: white; border-color: #7f1d1d; }
    button.danger:hover:not(:disabled) { background: #b91c1c; box-shadow: 4px 4px 0 #7f1d1d; }

    /* ── Config sidebar ──────────────────────────────────────── */
    .config-section {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }
    .config-section:last-child { border-bottom: none; }
    .config-section h3 {
      font-size: 12px; font-weight: 900; letter-spacing: .05em;
      text-transform: uppercase; margin-bottom: 12px;
    }
    .config-field { margin-bottom: 10px; }
    .config-field label {
      display: block; font-size: 11px; font-weight: 700;
      color: var(--text-muted); margin-bottom: 4px;
      text-transform: uppercase; letter-spacing: .05em;
    }
    .config-field input[type="text"],
    .config-field input[type="password"],
    .config-field input[type="number"],
    .config-field select {
      width: 100%;
      background: var(--bg-primary);
      border: 2px solid var(--border);
      color: var(--text-primary);
      padding: 6px 10px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      font-weight: 600;
    }
    .config-field input:focus, .config-field select:focus {
      outline: none; border-color: var(--text-primary);
    }
    .config-field input[type="checkbox"] { margin-right: 8px; width: 16px; height: 16px; }
    .config-field label.checkbox {
      display: flex; align-items: center; cursor: pointer;
      font-size: 12px; font-weight: 600; text-transform: none;
    }

    /* ── Status badges ───────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .05em;
      text-transform: uppercase;
      border: 2px solid currentColor;
      white-space: nowrap;
    }
    .badge.idle    { background: #e5e7eb; color: #374151; }
    .badge.prebuf  { background: #dbeafe; color: #1e40af; }
    .badge.ready   { background: var(--ok-bg); color: var(--ok-text); }
    .badge.playing { background: var(--warn-bg); color: var(--warn-text); }
    .badge.done    { background: var(--ok-bg); color: var(--ok-text); }
    .badge.skip    { background: var(--error-bg); color: var(--error-text); }
    .badge.error   { background: var(--error-bg); color: var(--error-text); }

    /* ── Collapsible ─────────────────────────────────────────── */
    .collapsible-toggle {
      cursor: pointer; user-select: none;
    }
    .collapsible-toggle::before {
      content: '\25B6'; display: inline-block; margin-right: 6px;
      font-size: 10px; transition: transform .2s;
    }
    .collapsible-toggle.open::before { transform: rotate(90deg); }
    .collapsible-body { display: none; }
    .collapsible-body.open { display: block; }

    /* ── Timing bar ──────────────────────────────────────────── */
    .timing { font-family: 'Courier New', monospace; font-size: 11px; color: var(--text-muted); }
  </style>
</head>
<body>
  <header>
    <h1>Broadsign Integration Test</h1>
    <span class="version">V2 Simulator</span>
  </header>

  <div class="container">
    <!-- ── Sidebar ─────────────────────────────────────────── -->
    <div class="sidebar">
      <div class="config-section">
        <h3>Adlocaite Config</h3>
        <div class="config-field">
          <label>API Key:</label>
          <input type="password" id="apiKey" value="" placeholder="pub_xxxx">
        </div>
        <div class="config-field">
          <label>API Environment:</label>
          <select id="apiEnvironment">
            <option value="https://staging.api.adlocaite.com/functions/v1/api">Staging</option>
            <option value="https://api.adlocaite.com/functions/v1/api">Production</option>
          </select>
        </div>
        <div class="config-field">
          <label>Min Bid (cents):</label>
          <input type="number" id="minBid" value="0" min="0">
        </div>
        <div class="config-field">
          <label class="checkbox">
            <input type="checkbox" id="vastMode" checked>
            VAST Mode
          </label>
        </div>
        <div class="config-field">
          <label class="checkbox">
            <input type="checkbox" id="debugMode" checked>
            Debug Mode
          </label>
        </div>
      </div>

      <div class="config-section">
        <h3>Broadsign Simulation</h3>
        <div class="config-field">
          <label>frame_id (Screen):</label>
          <input type="text" id="frameId" value="" placeholder="72510413">
        </div>
        <div class="config-field">
          <label>frame_resolution:</label>
          <input type="text" id="frameResolution" value="1920x1080" placeholder="1920x1080">
        </div>

        <!-- Advanced BroadSignObject properties -->
        <h3 class="collapsible-toggle" onclick="toggleCollapsible(this)" style="margin-top: 16px; cursor: pointer;">
          Advanced Properties
        </h3>
        <div class="collapsible-body">
          <div class="config-field">
            <label>display_unit_id:</label>
            <input type="text" id="displayUnitId" value="56006755" placeholder="56006755">
          </div>
          <div class="config-field">
            <label>player_id:</label>
            <input type="text" id="playerId" value="71846385" placeholder="71846385">
          </div>
          <div class="config-field">
            <label>display_unit_address:</label>
            <input type="text" id="displayUnitAddress" value="Berlin" placeholder="Berlin">
          </div>
          <div class="config-field">
            <label>display_unit_lat_long:</label>
            <input type="text" id="displayUnitLatLong" value="52.520007,13.404954">
          </div>
          <div class="config-field">
            <label>display_unit_resolution:</label>
            <input type="text" id="displayUnitResolution" value="1920x1080">
          </div>
          <div class="config-field">
            <label>expected_slot_duration_ms:</label>
            <input type="text" id="expectedSlotDuration" value="10000" disabled>
          </div>
          <div class="config-field">
            <label>dwell_time_duration_ms:</label>
            <input type="text" id="dwellTimeDuration" value="60000">
          </div>
        </div>
      </div>
    </div>

    <!-- ── Main ────────────────────────────────────────────── -->
    <div class="main">
      <div class="toolbar">
        <button onclick="loadPackage()" id="loadBtn">Load Package</button>
        <button onclick="triggerPlay()" id="playBtn" disabled>BroadSignPlay()</button>
        <button onclick="resetAll()" class="danger">Reset</button>

        <div class="toolbar-right">
          <span class="timing" id="timingDisplay"></span>
          <span class="badge idle" id="lifecycle">IDLE</span>
          <span class="badge idle" id="titleBadge">title: --</span>
        </div>
      </div>

      <div class="content" id="contentArea">
        <div class="placeholder">Click "Load Package" to simulate PREBUFFER</div>
      </div>

      <div class="logs" id="logs"></div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════
    //  State
    // ═══════════════════════════════════════════════════════════
    let packageWindow = null;
    let titleMonitorInterval = null;
    let lastTitle = null;
    let loadStartTime = null;   // when iframe starts loading (PREBUFFER)
    let readyTime = null;       // when title becomes "ready"
    let playTriggerTime = null; // when BroadSignPlay() is called

    // ═══════════════════════════════════════════════════════════
    //  LocalStorage persistence
    // ═══════════════════════════════════════════════════════════
    const STORAGE_KEY = 'adlocaite_test_config_v2';

    function loadFromStorage() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      } catch { return {}; }
    }

    function saveToStorage() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          apiKey: $('apiKey').value,
          frameId: $('frameId').value,
          frameResolution: $('frameResolution').value,
          apiEnvironment: $('apiEnvironment').value,
          vastMode: $('vastMode').checked,
          debugMode: $('debugMode').checked,
          minBid: $('minBid').value,
          displayUnitId: $('displayUnitId').value,
          playerId: $('playerId').value,
          displayUnitAddress: $('displayUnitAddress').value,
          displayUnitLatLong: $('displayUnitLatLong').value,
          displayUnitResolution: $('displayUnitResolution').value,
          dwellTimeDuration: $('dwellTimeDuration').value,
        }));
      } catch {}
    }

    function initializeForm() {
      const urlParams = new URLSearchParams(window.location.search);
      const stored = loadFromStorage();

      // Priority: URL params > localStorage > defaults
      setVal('apiKey',      urlParams.get('api_key')   || stored.apiKey || '');
      setVal('frameId',     urlParams.get('frame_id')  || stored.frameId || '');
      setVal('minBid',      urlParams.get('min_bid')   || stored.minBid || '0');
      setVal('frameResolution', urlParams.get('resolution') || stored.frameResolution || '1920x1080');

      // Select
      const env = urlParams.get('env');
      if (env === 'production' || env === 'prod') {
        $('apiEnvironment').value = 'https://api.adlocaite.com/functions/v1/api';
      } else if (stored.apiEnvironment) {
        $('apiEnvironment').value = stored.apiEnvironment;
      }

      // Checkboxes
      $('vastMode').checked = urlParams.has('vast') ? urlParams.get('vast') !== 'false' : (stored.vastMode !== undefined ? stored.vastMode : true);
      $('debugMode').checked = urlParams.has('debug') ? urlParams.get('debug') !== 'false' : (stored.debugMode !== undefined ? stored.debugMode : true);

      // Advanced
      setVal('displayUnitId',        stored.displayUnitId || '56006755');
      setVal('playerId',             stored.playerId || '71846385');
      setVal('displayUnitAddress',   stored.displayUnitAddress || 'Berlin');
      setVal('displayUnitLatLong',   stored.displayUnitLatLong || '52.520007,13.404954');
      setVal('displayUnitResolution', stored.displayUnitResolution || '1920x1080');
      setVal('dwellTimeDuration',    stored.dwellTimeDuration || '60000');

      if (urlParams.get('api_key') || urlParams.get('frame_id')) {
        log('Config loaded from URL parameters', 'success');
      } else if (stored.apiKey || stored.frameId) {
        log('Config restored from localStorage', 'info');
      }
    }

    function setupAutoSave() {
      document.querySelectorAll('.sidebar input, .sidebar select').forEach(el => {
        el.addEventListener('change', saveToStorage);
        el.addEventListener('input', saveToStorage);
      });
    }

    // ═══════════════════════════════════════════════════════════
    //  Lifecycle
    // ═══════════════════════════════════════════════════════════
    function setLifecycle(phase) {
      const el = $('lifecycle');
      el.textContent = phase;
      el.className = 'badge ' + ({
        'IDLE': 'idle', 'PREBUFFER': 'prebuf', 'READY': 'ready',
        'PLAYING': 'playing', 'COMPLETE': 'done', 'SKIP': 'skip', 'ERROR': 'error'
      }[phase] || 'idle');
    }

    function updateTiming() {
      if (!loadStartTime) return;
      const now = performance.now();
      const parts = [];

      if (readyTime) {
        parts.push(`preload: ${((readyTime - loadStartTime) / 1000).toFixed(2)}s`);
      } else {
        parts.push(`loading: ${((now - loadStartTime) / 1000).toFixed(1)}s`);
      }

      if (playTriggerTime && readyTime) {
        parts.push(`idle: ${((playTriggerTime - readyTime) / 1000).toFixed(2)}s`);
      }

      $('timingDisplay').textContent = parts.join(' | ');
    }

    // ═══════════════════════════════════════════════════════════
    //  Title monitoring
    // ═══════════════════════════════════════════════════════════
    function startTitleMonitor() {
      if (titleMonitorInterval) clearInterval(titleMonitorInterval);

      titleMonitorInterval = setInterval(() => {
        try {
          const iframe = $('packageFrame');
          if (!iframe || !iframe.contentDocument) return;
          const title = iframe.contentDocument.title;
          if (title === lastTitle) return;

          lastTitle = title;
          const elapsed = loadStartTime ? ((performance.now() - loadStartTime) / 1000).toFixed(2) : '?';
          const badge = $('titleBadge');
          badge.textContent = `title: ${title}`;

          if (title === 'ready') {
            badge.className = 'badge ready';
            if (!readyTime) {
              readyTime = performance.now();
              setLifecycle('READY');
              updateTiming();
            }
            log(`Title -> "${title}" (T+${elapsed}s)`, 'success');
          } else if (title === 'wait') {
            badge.className = 'badge prebuf';
            log(`Title -> "${title}" (T+${elapsed}s)`, 'info');
          } else if (title.startsWith('skip')) {
            badge.className = 'badge skip';
            setLifecycle('SKIP');
            log(`Title -> "${title}" (T+${elapsed}s)`, 'error');
          } else {
            badge.className = 'badge idle';
          }
        } catch {}
      }, 100);
    }

    // ═══════════════════════════════════════════════════════════
    //  Core: Load Package (PREBUFFER simulation)
    // ═══════════════════════════════════════════════════════════
    function loadPackage() {
      // Validate
      const frameId = $('frameId').value.trim();
      const apiKey = $('apiKey').value.trim();
      if (!frameId) { log('ERROR: frame_id is required', 'error'); return; }
      if (!apiKey)  { log('ERROR: API key is required', 'error'); return; }

      // Reset state
      lastTitle = null;
      readyTime = null;
      playTriggerTime = null;
      loadStartTime = performance.now();
      $('titleBadge').textContent = 'title: --';
      $('titleBadge').className = 'badge idle';
      $('timingDisplay').textContent = '';

      log('=== PREBUFFER Phase ===', 'success');
      setLifecycle('PREBUFFER');

      // Store config override for the package (accessed via parent.ADLOCAITE_TEST_CONFIG)
      window.ADLOCAITE_TEST_CONFIG = {
        apiKey: apiKey,
        apiBaseUrl: $('apiEnvironment').value,
        vastMode: $('vastMode').checked,
        debugMode: $('debugMode').checked,
        minBidCents: parseInt($('minBid').value) || 0,
      };

      // Build /package-sim URL with all BroadSignObject properties
      const [frameW, frameH] = $('frameResolution').value.split('x');
      const simParams = new URLSearchParams({
        frame_id:                   frameId,
        display_unit_id:            $('displayUnitId').value,
        player_id:                  $('playerId').value,
        display_unit_address:       $('displayUnitAddress').value,
        display_unit_lat_long:      $('displayUnitLatLong').value,
        display_unit_location_code: '',
        display_unit_resolution:    $('displayUnitResolution').value,
        frame_resolution:           $('frameResolution').value,
        expected_slot_duration_ms:  '10000',
        dwell_time_duration_ms:     $('dwellTimeDuration').value,
        impressions_per_hour:       '0.000000',
        expected_impressions:       '0.000000',
        campaign_id:                'test-campaign-001',
        ad_copy_id:                 'test-adcopy-001',
      });

      const packageUrl = `/package-sim?${simParams.toString()}`;

      log(`BroadSignObject.frame_id = ${frameId}`, 'info');
      log(`Loading package via /package-sim (BroadSignObject injected before scripts)`, 'info');

      // Create iframe
      const contentArea = $('contentArea');
      const wrapper = document.createElement('div');
      wrapper.className = 'content-wrapper';
      wrapper.style.width = (frameW || 1920) + 'px';
      wrapper.style.height = (frameH || 1080) + 'px';

      const iframe = document.createElement('iframe');
      iframe.id = 'packageFrame';
      iframe.src = packageUrl;

      iframe.onload = () => {
        packageWindow = iframe.contentWindow;
        log('Package HTML loaded', 'success');

        // Intercept iframe console for our log panel
        interceptConsole(packageWindow);

        // Start title monitor
        startTitleMonitor();

        // Start timing display update
        const timingInterval = setInterval(() => {
          updateTiming();
          // Stop updating once we have all timing data
          if (readyTime && playTriggerTime) clearInterval(timingInterval);
        }, 200);

        // Update iframe size
        updateContentSize();

        // Enable Play button
        $('playBtn').disabled = false;
        log('Ready -- click "BroadSignPlay()" to simulate ad slot display', 'info');
      };

      iframe.onerror = () => {
        log('ERROR: Failed to load package', 'error');
        setLifecycle('ERROR');
      };

      wrapper.appendChild(iframe);
      contentArea.innerHTML = '';
      contentArea.appendChild(wrapper);

      $('loadBtn').disabled = true;
      saveToStorage();
    }

    // ═══════════════════════════════════════════════════════════
    //  Core: Trigger BroadSignPlay()
    // ═══════════════════════════════════════════════════════════
    function triggerPlay() {
      const iframe = $('packageFrame');
      if (!iframe || !iframe.contentWindow) {
        log('ERROR: Package not loaded', 'error');
        return;
      }

      log('=== BroadSignPlay() triggered ===', 'success');
      playTriggerTime = performance.now();
      setLifecycle('PLAYING');
      updateTiming();

      try {
        if (typeof iframe.contentWindow.BroadSignPlay === 'function') {
          iframe.contentWindow.BroadSignPlay();
          log('BroadSignPlay() called successfully', 'success');
        } else {
          log('ERROR: BroadSignPlay() not defined in package', 'error');
          setLifecycle('ERROR');
        }
      } catch (err) {
        log('ERROR: ' + err.message, 'error');
        setLifecycle('ERROR');
      }

      $('playBtn').disabled = true;
    }

    // ═══════════════════════════════════════════════════════════
    //  Reset
    // ═══════════════════════════════════════════════════════════
    function resetAll() {
      if (titleMonitorInterval) clearInterval(titleMonitorInterval);
      packageWindow = null;
      lastTitle = null;
      loadStartTime = null;
      readyTime = null;
      playTriggerTime = null;

      $('contentArea').innerHTML = '<div class="placeholder">Click "Load Package" to simulate PREBUFFER</div>';
      $('logs').innerHTML = '';
      $('loadBtn').disabled = false;
      $('playBtn').disabled = true;
      $('timingDisplay').textContent = '';
      setLifecycle('IDLE');
      $('titleBadge').textContent = 'title: --';
      $('titleBadge').className = 'badge idle';
      log('Reset complete', 'info');
    }

    // ═══════════════════════════════════════════════════════════
    //  Console interception
    // ═══════════════════════════════════════════════════════════
    function interceptConsole(win) {
      if (!win) return;
      const origLog = win.console.log;
      const origErr = win.console.error;
      const origWarn = win.console.warn;

      win.console.log = function(...args) {
        origLog.apply(win.console, args);
        const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');

        // Detect lifecycle events from log messages
        if (msg.includes('Pre-load complete') || msg.includes('pre-loaded successfully')) {
          log(msg, 'success');
        } else if (msg.includes('BroadSignPlay')) {
          log(msg, 'info');
        } else if (msg.includes('Playback completed') || msg.includes('Playout confirmed')) {
          log(msg, 'success');
          setLifecycle('COMPLETE');
        } else if (msg.includes('Firing tracking event')) {
          log(msg, 'info');
        } else {
          // Only show [Adlocaite], [Broadsign], [VAST], [Cache] prefixed messages
          if (msg.match(/^\[.*\]/)) log(msg, 'info');
        }
      };

      win.console.error = function(...args) {
        origErr.apply(win.console, args);
        const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
        log(msg, 'error');
      };

      win.console.warn = function(...args) {
        origWarn.apply(win.console, args);
        const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
        log(msg, 'warning');
      };
    }

    // ═══════════════════════════════════════════════════════════
    //  Helpers
    // ═══════════════════════════════════════════════════════════
    function $(id) { return document.getElementById(id); }
    function setVal(id, val) { const el = $(id); if (el) el.value = val; }

    function log(message, type = 'info') {
      const ts = new Date().toTimeString().split(' ')[0];
      const logs = $('logs');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.innerHTML = `<span class="ts">[${ts}]</span> ${escapeHtml(message)}`;
      logs.appendChild(entry);
      logs.scrollTop = logs.scrollHeight;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function toggleCollapsible(toggle) {
      toggle.classList.toggle('open');
      const body = toggle.nextElementSibling;
      if (body) body.classList.toggle('open');
    }

    function updateContentSize() {
      const [width, height] = $('frameResolution').value.split('x');
      const wrapper = document.querySelector('.content-wrapper');
      if (!wrapper) return;
      const area = $('contentArea');
      const maxW = area.clientWidth - 40;
      const maxH = area.clientHeight - 40;
      const scale = Math.min(maxW / parseInt(width), maxH / parseInt(height), 1);
      wrapper.style.transform = `scale(${scale})`;
    }

    // ═══════════════════════════════════════════════════════════
    //  Init
    // ═══════════════════════════════════════════════════════════
    window.addEventListener('DOMContentLoaded', () => {
      initializeForm();
      setupAutoSave();
      log('Test simulator ready (V2)', 'info');
      log('TIP: ?api_key=xxx&frame_id=yyy in URL for quick config', 'info');
    });

    window.addEventListener('resize', updateContentSize);
  </script>
</body>
</html>
