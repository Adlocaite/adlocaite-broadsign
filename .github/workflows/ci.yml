name: CI

on:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-token-check:
    name: Deploy Token Check
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Validate DEPLOY_PAT
        id: check
        env:
          DEPLOY_PAT: ${{ secrets.DEPLOY_PAT }}
        run: |
          if [ -z "$DEPLOY_PAT" ]; then
            echo "status=missing" >> $GITHUB_OUTPUT
            exit 0
          fi

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $DEPLOY_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "status=valid" >> $GITHUB_OUTPUT
          else
            echo "status=expired" >> $GITHUB_OUTPUT
            echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          fi

      - name: Post warning comment
        if: steps.check.outputs.status != 'valid'
        uses: actions/github-script@v7
        env:
          TOKEN_STATUS: ${{ steps.check.outputs.status }}
          HTTP_CODE: ${{ steps.check.outputs.http_code }}
        with:
          script: |
            const status = process.env.TOKEN_STATUS;
            const httpCode = process.env.HTTP_CODE;

            const statusMsg = status === 'missing'
              ? '`DEPLOY_PAT` secret is **not set**.'
              : `\`DEPLOY_PAT\` is **expired or invalid** (HTTP ${httpCode}).`;

            const body = [
              `## Deploy Token Check: FAILED`,
              ``,
              `${statusMsg}`,
              `Without a valid token, the **version bump after merging to main will fail**.`,
              ``,
              `### How to fix`,
              ``,
              `**1. Create a Fine-grained PAT:**`,
              `- Go to **GitHub > Settings > Developer Settings > Personal Access Tokens > Fine-grained tokens**`,
              `- **Token name:** \`deploy-version-bump-adlocaite-broadsign\``,
              `- **Expiration:** 90 days (set a calendar reminder!)`,
              `- **Resource owner:** \`Adlocaite\``,
              `- **Repository access:** "Only select repositories" > \`adlocaite-broadsign\``,
              `- **Permissions:** Contents: Read and Write`,
              `- Click **Generate token** and copy it`,
              ``,
              `**2. Add/update the repo secret:**`,
              `- Go to [Repository Secrets](https://github.com/${context.repo.owner}/${context.repo.repo}/settings/secrets/actions)`,
              `- Create or update secret **\`DEPLOY_PAT\`** with the new token`,
              ``,
              `---`,
              `<!-- DEPLOY_TOKEN_CHECK_COMMENT -->`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body && c.body.includes('<!-- DEPLOY_TOKEN_CHECK_COMMENT -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Fail if token invalid
        if: steps.check.outputs.status != 'valid'
        run: |
          echo "::error::DEPLOY_PAT is ${{ steps.check.outputs.status }}. Version bump will fail on merge to main."
          exit 1

  build:
    name: Build Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v4

      - name: Prepare build environment
        run: |
          cp package/js/config.example.js package/js/config.js
          sed -i "s/apiKey: 'pub_xxxx'/apiKey: 'pub_CI_BUILD'/" package/js/config.js

      - name: Build package
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Verify package
        run: |
          if [ ! -f "adlocaite-broadsign.x-html-package" ]; then
            echo "ERROR: Package file not found"
            exit 1
          fi

          # Verify it's a valid zip
          unzip -t adlocaite-broadsign.x-html-package

          # Verify required files are in the package
          unzip -l adlocaite-broadsign.x-html-package | grep -q "index.html" || { echo "ERROR: index.html missing"; exit 1; }
          unzip -l adlocaite-broadsign.x-html-package | grep -q "js/config.js" || { echo "ERROR: config.js missing"; exit 1; }
          unzip -l adlocaite-broadsign.x-html-package | grep -q "js/broadsign-adapter.js" || { echo "ERROR: broadsign-adapter.js missing"; exit 1; }
          unzip -l adlocaite-broadsign.x-html-package | grep -q "js/adlocaite-api.js" || { echo "ERROR: adlocaite-api.js missing"; exit 1; }
          unzip -l adlocaite-broadsign.x-html-package | grep -q "js/vast-parser.js" || { echo "ERROR: vast-parser.js missing"; exit 1; }
          unzip -l adlocaite-broadsign.x-html-package | grep -q "js/player.js" || { echo "ERROR: player.js missing"; exit 1; }

          echo "All required files present in package"
