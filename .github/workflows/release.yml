name: Release Automation

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write
  pull-requests: write

jobs:
  # Job 1: Version bump on main branch (PR merge with version label)
  version-bump:
    name: Bump Version
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      version_bumped: ${{ steps.bump.outputs.version_bumped || steps.skip.outputs.version_bumped }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DEPLOY_PAT }}

      - name: Get PR labels
        id: pr-labels
        uses: actions/github-script@v7
        with:
          script: |
            // Use REST pulls.list (immediately consistent) instead of search API
            // (eventually consistent, ~10-30s indexing latency that races the
            // workflow's start time and silently drops version bumps).
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 10
            });

            const mergedPR = prs.find(pr => pr.merge_commit_sha === context.sha);

            if (!mergedPR) {
              core.info(`No merged PR found for commit ${context.sha}`);
              core.setOutput('has_version_label', 'false');
              return;
            }

            core.info(`Found PR #${mergedPR.number}`);

            const labels = mergedPR.labels.map(l => l.name);
            core.info(`PR labels: ${labels.join(', ')}`);

            const versionLabel = ['major', 'minor', 'patch'].find(
              kind => labels.includes(`version:${kind}`)
            );

            if (!versionLabel) {
              core.info('No version label found, skipping version bump');
              core.setOutput('has_version_label', 'false');
              return;
            }

            core.info(`Version label: ${versionLabel}`);
            core.setOutput('has_version_label', 'true');
            core.setOutput('version_label', versionLabel);

      - name: Bump version
        id: bump
        if: steps.pr-labels.outputs.has_version_label == 'true'
        run: |
          # Read current version from package.json
          CURRENT_VERSION=$(grep -o '"version": "[^"]*"' package.json | cut -d'"' -f4)
          echo "Current version: $CURRENT_VERSION"

          # Parse version components
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          # Calculate new version based on label
          VERSION_LABEL="${{ steps.pr-labels.outputs.version_label }}"
          case "$VERSION_LABEL" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"

          # Update package.json - use pattern-based replacement (not line numbers)
          # Note: sed -i syntax is Linux-specific (GitHub Actions uses Ubuntu)
          # For local macOS testing, use: sed -i '' "..." file
          sed -i 's/"version": "[^"]*"/"version": "'"$NEW_VERSION"'"/' package.json

          # Update config.example.js - use pattern-based replacement (not line numbers)
          sed -i "s/packageVersion: '[^']*'/packageVersion: '$NEW_VERSION'/" package/js/config.example.js

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Commit and push
          git add package.json package/js/config.example.js
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push

          # Set outputs
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_bumped=true" >> $GITHUB_OUTPUT

      - name: Skip version bump
        id: skip
        if: steps.pr-labels.outputs.has_version_label != 'true'
        run: |
          echo "Skipping version bump - no version label found"
          echo "version_bumped=false" >> $GITHUB_OUTPUT

  # Job 2: Create GitHub Release (depends on version-bump)
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: version-bump
    if: needs.version-bump.outputs.version_bumped == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest changes
        run: |
          git pull origin main

      - name: Prepare build environment
        run: |
          # Create config.js from example for CI builds
          # build.sh requires config.js to exist, even though the package won't be used without a real API key
          cp package/js/config.example.js package/js/config.js
          # Set placeholder API key for CI (users will configure their own key before use)
          sed -i "s/apiKey: 'pub_xxxx'/apiKey: 'pub_CI_BUILD'/" package/js/config.js
          echo "config.js created for CI build"

      - name: Build package
        run: |
          chmod +x build.sh
          ./build.sh

          # Verify package was created
          if [ ! -f "adlocaite-broadsign.x-html-package" ]; then
            echo "ERROR: Package build failed"
            exit 1
          fi

          echo "Package built successfully"

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' package.json | cut -d'"' -f4)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Rename artifact
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mv adlocaite-broadsign.x-html-package "adlocaite-broadsign-v${VERSION}.x-html-package"
          echo "Artifact renamed to: adlocaite-broadsign-v${VERSION}.x-html-package"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## Adlocaite Broadsign Integration v${{ steps.version.outputs.version }}

            ### Installation

            1. Download `adlocaite-broadsign-v${{ steps.version.outputs.version }}.x-html-package`
            2. Upload to Broadsign Control as HTML5 content
            3. Configure your API key in `package/js/config.js`

            ### Documentation

            See [README.md](https://github.com/adlocaite/adlocaite-broadsign/blob/main/README.md) for full documentation.

            ---

            **Full Changelog**: https://github.com/adlocaite/adlocaite-broadsign/compare/v${{ steps.version.outputs.version }}...HEAD
          files: |
            adlocaite-broadsign-v${{ steps.version.outputs.version }}.x-html-package
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 3: Sync version to dev branch (depends on create-release)
  sync-to-dev:
    name: Sync to Dev
    runs-on: ubuntu-latest
    needs: [version-bump, create-release]
    if: needs.version-bump.outputs.version_bumped == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.DEPLOY_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get version
        id: version
        run: |
          git fetch origin main
          git checkout main
          VERSION=$(grep -o '"version": "[^"]*"' package.json | cut -d'"' -f4)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version to sync: $VERSION"
          git checkout dev

      - name: Create sync branch
        id: sync-branch
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH_NAME="sync-version-${VERSION}"

          # Create branch from dev
          git checkout -b "$BRANCH_NAME"

          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Cherry-pick version bump commit
        run: |
          # Find the version bump commit on main
          git fetch origin main
          COMMIT_SHA=$(git log origin/main --grep="chore: bump version to ${{ steps.version.outputs.version }}" --format="%H" -n 1)

          if [ -z "$COMMIT_SHA" ]; then
            echo "ERROR: Version bump commit not found"
            exit 1
          fi

          echo "Cherry-picking commit: $COMMIT_SHA"
          git cherry-pick "$COMMIT_SHA"

      - name: Push sync branch
        run: |
          BRANCH_NAME="${{ steps.sync-branch.outputs.branch_name }}"
          git push origin "$BRANCH_NAME"

      - name: Create PR to dev
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH_NAME="${{ steps.sync-branch.outputs.branch_name }}"

          gh pr create \
            --base dev \
            --head "$BRANCH_NAME" \
            --title "chore: sync version to $VERSION from main" \
            --body "Syncs version bump to \`$VERSION\` from main branch.

          This PR updates:
          - \`package.json\` version field
          - \`package/js/config.example.js\` packageVersion field

          **Note:** This PR is automatically generated by the release workflow. Review and merge manually." \
            --label "version-sync"
        env:
          # DEPLOY_PAT (not GITHUB_TOKEN): a PR opened with GITHUB_TOKEN does not
          # trigger pull_request workflows on its own (anti-recursion safeguard),
          # which leaves the Build Package required check empty and the sync PR
          # stuck in BLOCKED. A PAT-authored PR triggers CI like a human-opened
          # one would.
          GH_TOKEN: ${{ secrets.DEPLOY_PAT }}

  # Job 4: Dev pre-release (dev branch only)
  dev-prerelease:
    name: Dev Pre-release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' package.json | cut -d'"' -f4)
          echo "base_version=$VERSION" >> $GITHUB_OUTPUT
          echo "Base version: $VERSION"

      - name: Find highest dev tag
        id: dev-tag
        run: |
          BASE_VERSION="${{ steps.version.outputs.base_version }}"

          # Get all tags matching vX.Y.Z-dev.N pattern for this version
          DEV_TAGS=$(git tag -l "v${BASE_VERSION}-dev.*" | sort -V)

          if [ -z "$DEV_TAGS" ]; then
            echo "No existing dev tags found for v${BASE_VERSION}"
            NEXT_N=1
          else
            # Get the highest N value
            HIGHEST_TAG=$(echo "$DEV_TAGS" | tail -n 1)
            echo "Highest dev tag: $HIGHEST_TAG"

            # Extract N from vX.Y.Z-dev.N
            CURRENT_N=$(echo "$HIGHEST_TAG" | sed -n 's/.*-dev\.\([0-9]*\)$/\1/p')
            NEXT_N=$((CURRENT_N + 1))
          fi

          NEW_TAG="v${BASE_VERSION}-dev.${NEXT_N}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "New dev tag: $NEW_TAG"

      - name: Create dev tag
        run: |
          NEW_TAG="${{ steps.dev-tag.outputs.new_tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$NEW_TAG" -m "Dev pre-release $NEW_TAG"
          git push origin "$NEW_TAG"

          echo "Created and pushed tag: $NEW_TAG"

      - name: Prepare build environment
        run: |
          # Create config.js from example for CI builds
          # build.sh requires config.js to exist, even though the package won't be used without a real API key
          cp package/js/config.example.js package/js/config.js
          # Set placeholder API key for CI (users will configure their own key before use)
          sed -i "s/apiKey: 'pub_xxxx'/apiKey: 'pub_CI_BUILD'/" package/js/config.js
          echo "config.js created for CI build"

      - name: Build package
        run: |
          chmod +x build.sh
          ./build.sh

          # Verify package was created
          if [ ! -f "adlocaite-broadsign.x-html-package" ]; then
            echo "ERROR: Package build failed"
            exit 1
          fi

          echo "Package built successfully"

      - name: Rename artifact
        id: artifact
        run: |
          NEW_TAG="${{ steps.dev-tag.outputs.new_tag }}"
          ARTIFACT_NAME="adlocaite-broadsign-${NEW_TAG}.x-html-package"

          mv adlocaite-broadsign.x-html-package "$ARTIFACT_NAME"

          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          echo "Artifact renamed to: $ARTIFACT_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: ${{ steps.artifact.outputs.artifact_name }}
          retention-days: 30
          if-no-files-found: error
